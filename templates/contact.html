{% extends "base.html" %}

{% block title %}お問い合わせ{% endblock %}

{% block content %}
<div style="max-width: 560px; margin: 40px auto; background: var(--bg-card); padding: 32px; border-radius: 12px; border: 1px solid var(--border);">
    <h2 style="color: var(--accent); text-align: center; margin-bottom: 8px;">お問い合わせ</h2>
    <p style="text-align: center; font-size: 0.88rem; color: var(--text-dim); margin-bottom: 28px;">
        ご質問・ご要望・バグ報告などがございましたら、以下のフォームよりお送りください。
    </p>

    {% if error %}
    <div style="color: #ef4444; background: rgba(239,68,68,0.1); padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="color: #10b981; background: rgba(16,185,129,0.1); padding: 16px; border-radius: 6px; margin-bottom: 20px; font-size: 0.95rem; text-align: center;">
        ✅ {{ success }}
    </div>
    <div style="text-align: center; margin-top: 16px;">
        <a href="/" style="color: var(--accent); text-decoration: underline;">ホームに戻る</a>
    </div>
    {% else %}
    <form method="POST" action="/contact">
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1;">
                お名前 <span style="color:#ef4444;">*</span>
            </label>
            <input type="text" name="name" required
                style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box;"
                placeholder="山田 太郎">
        </div>
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1;">
                メールアドレス <span style="color:#ef4444;">*</span>
            </label>
            <input type="email" name="email" required
                style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box;"
                placeholder="example@gmail.com">
        </div>
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1;">
                件名 <span style="color:#ef4444;">*</span>
            </label>
            <input type="text" name="subject" required maxlength="100"
                style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box;"
                placeholder="バグ報告・機能要望など">
        </div>
        <div style="margin-bottom: 24px;">
            <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1;">
                お問い合わせ内容 <span style="color:#ef4444;">*</span>
            </label>
            <textarea name="message" required rows="6" maxlength="2000"
                style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: white; resize: vertical; box-sizing: border-box; font-family: inherit; font-size: 0.9rem;"
                placeholder="詳細をこちらにご記入ください..."></textarea>
        </div>
        <button type="submit"
            style="width: 100%; padding: 12px; background: var(--accent); color: var(--bg-dark); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem;">
            送信する
        </button>
    </form>
    {% endif %}

    <div style="margin-top: 24px; text-align: center; font-size: 0.85rem;">
        <a href="/login" style="color: var(--text-dim); text-decoration: underline;">← ログイン画面に戻る</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tabs = document.querySelector('.mode-tabs');
        if (tabs) tabs.style.display = 'none';
        const filters = document.querySelector('.filter-section');
        if (filters) filters.style.display = 'none';
    });
</script>
{% endblock %}
