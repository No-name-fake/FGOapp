{% extends "base.html" %}

{% block title %}編成一覧{% endblock %}

{% block head %}
<style>
    /* 一覧表示固有のスタイル（必要に応じて） */
    .party-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="party-list" id="party-list"></div>
{% endblock %}

{% block scripts %}
<script>
    /**
     * 編成一覧ページの初期化
     */
    async function onInit() {
        // ナビのアクティブ状態を設定
        document.getElementById('nav-parties').classList.add('active');
        
        // このページでは不要な共通UI（タブやフィルタ）を非表示にする
        const tabs = document.querySelector('.mode-tabs');
        if (tabs) tabs.style.display = 'none';
        
        const filters = document.querySelector('.filter-section');
        if (filters) filters.style.display = 'none';

        // 所持フィルタなどの「表示設定」も隠す
        const ownedFilter = document.querySelector('#owned-filter');
        if (ownedFilter) ownedFilter.closest('.filter-group').style.display = 'none';

        // 保存済みパーティの読み込み
        loadParties();
    }

    /**
     * サーバーから保存済みパーティを取得して表示する
     */
    async function loadParties() {
        const list = document.getElementById('party-list');
        list.innerHTML = '<div class="loading">読み込み中...</div>';

        // APIからデータを取得
        const res = await fetch('/api/parties');
        const parties = await res.json();

        // データがない場合の表示
        if (parties.length === 0) {
            list.innerHTML = `<div class="no-parties">保存された編成はまだありません。<br>
                              <a href="/" style="color:var(--accent)">編成ページへ</a></div>`;
            return;
        }

        list.innerHTML = '';

        // 各パーティ情報をカード形式で描画
        parties.forEach(p => {
            let totalCost = 0;

            // 前衛(1-3)と控え(4-6)のスロットを生成する補助関数
            const renderSlots = (start, end) => {
                let html = '';
                for (let i = start; i <= end; i++) {
                    const svtId = p[`s${i}`];
                    const ceId = p[`c${i}`];
                    const np = p[`s${i}_np`] || 1;
                    const sk1 = p[`s${i}_sk1`] || 10;
                    const sk2 = p[`s${i}_sk2`] || 10;
                    const sk3 = p[`s${i}_sk3`] || 10;

                    // base.html の global 変数から詳細情報を検索
                    const svt = svtId ? allServantsMeta.find(m => m.id === svtId) : null;
                    const ce = ceId ? allCEsMeta.find(c => c.id === ceId) : null;

                    // コスト計算
                    if (svt) totalCost += (sCostMap[svt.rarity] || 0);
                    if (ce) totalCost += (ce.cost || 0);

                    if (svt) {
                        html += `
                        <div class="party-slot-mini">
                            <div class="party-slot-mini-icons">
                                <img class="svt-img" src="${svt.face}" alt="${svt.name}">
                                ${ce ? `<img class="ce-img" src="${ce.face}" alt="${ce.name}" title="${ce.name}">` : ''}
                            </div>
                            <div class="slot-detail">
                                <div class="slot-name">${svt.name}</div>
                                <div><span class="np-badge">宝具${np}</span></div>
                                <div class="skill-row">
                                    <span class="sk-val">${sk1}</span>
                                    <span class="sk-val">${sk2}</span>
                                    <span class="sk-val">${sk3}</span>
                                </div>
                                ${ce ? `<div class="ce-name-mini">${ce.name}</div>` : ''}
                            </div>
                        </div>`;
                    } else {
                        html += `<div class="party-slot-mini"><div class="party-slot-mini-icons"><div class="empty-slot-mini">−</div></div></div>`;
                    }
                }
                return html;
            };

                const createdAt = new Date(p.created_at.replace(' ', 'T') + 'Z').toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
                const mcId = p.mystic_code_id;
                const mc = allMysticCodesMeta.find(m => m.id === (mcId || -1));
                const mcName = mc ? mc.name : (p.mystic_code || 'カルデア');
                
                let mcHtml = '';
                if (mc) {
                    mcHtml = `
                        <div class="mc-display-mini">
                            <img src="${mc.extraAssets.item.male}" class="mc-img-mini" title="${mc.name}">
                            <div class="mc-skills-mini">
                                ${mc.skills.map(sk => `<img src="${sk.icon}" title="${sk.name}: ${sk.detail}" class="mc-sk-mini">`).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    mcHtml = `<span class="mc-badge">🎩 ${mcName}</span>`;
                }

                const card = document.createElement('div');
                card.className = 'saved-party-card';

                const frontHtml = renderSlots(1, 3);
                const subHtml = renderSlots(4, 6);
                const costClass = totalCost > 114 ? 'over' : 'ok';

                // カードのHTML組み立て
                card.innerHTML = `
                    <div class="party-card-header">
                        <span class="party-card-name">📋 ${p.name}</span>
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${mcHtml}
                            <button class="delete-party-btn" onclick="deleteParty(${p.id})">🗑 削除</button>
                        </div>
                    </div>
                    ${p.category ? `<span class="meta-tag cat-tag">${p.category}</span>` : ''}
                    ${p.location ? `<span class="meta-tag loc-tag">📍 ${p.location}</span>` : ''}
                    ${p.difficulty ? `<span class="meta-tag diff-tag">⚔️ ${p.difficulty}</span>` : ''}
                    <span style="margin-left:auto;color:var(--text-dim);font-size:0.8rem">${createdAt}</span>
                </div>
                <div class="section-div">▶ 前衛</div>
                <div class="party-slots-row">${frontHtml}</div>
                <div class="section-div" style="margin-top:10px">▶ 控え</div>
                <div class="party-slots-row" style="opacity:0.75">${subHtml}</div>
                ${p.memo ? `<div class="memo-display"><span class="memo-icon">📝</span><div class="memo-text">${p.memo}</div></div>` : ''}
            `;
            list.appendChild(card);
        });
    }

    /**
     * 指定したパーティを削除する
     * @param {number} id パーティID
     */
    async function deleteParty(id) {
        if (!confirm('この編成を削除しますか？')) return;
        
        try {
            const res = await fetch(`/api/parties/${id}`, { method: 'DELETE' });
            if (res.ok) {
                // 削除成功したらリストを再読み込み
                loadParties();
            } else {
                throw new Error('削除失敗');
            }
        } catch (e) {
            console.error("削除エラー:", e);
            alert('削除に失敗しました。');
        }
    }
</script>
{% endblock %}
