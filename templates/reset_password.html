{% extends "base.html" %}

{% block title %}パスワードの再設定{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 40px auto; background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--border);">
    <h2 style="color: var(--accent); text-align: center; margin-bottom: 8px;">パスワードの再設定</h2>
    <p style="text-align: center; font-size: 0.88rem; color: var(--text-dim); margin-bottom: 24px;">
        新しいパスワードを入力してください。
    </p>

    {% if error %}
    <div style="color: #ef4444; background: rgba(239,68,68,0.1); padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}

    {% if token %}
    <form method="POST" action="/reset-password/{{ token }}">
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1;">新しいパスワード</label>
            <input type="password" name="password" required
                style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box;"
                placeholder="6文字以上">
        </div>
        <div style="margin-bottom: 24px;">
            <label style="display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1;">新しいパスワード（確認）</label>
            <input type="password" name="confirm" required
                style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box;"
                placeholder="もう一度入力">
        </div>
        <button type="submit"
            style="width: 100%; padding: 12px; background: var(--accent); color: var(--bg-dark); border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
            パスワードを変更する
        </button>
    </form>
    {% else %}
    <div style="text-align:center; color: var(--text-dim); font-size: 0.9rem;">
        このリンクは無効または期限切れです。<br>
        <a href="/forgot-password" style="color: var(--accent); text-decoration: underline; margin-top: 12px; display: inline-block;">
            もう一度リセットを申請する
        </a>
    </div>
    {% endif %}

    <div style="margin-top: 20px; text-align: center; font-size: 0.85rem;">
        <a href="/login" style="color: var(--text-dim); text-decoration: underline;">← ログイン画面に戻る</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tabs = document.querySelector('.mode-tabs');
        if (tabs) tabs.style.display = 'none';
        const filters = document.querySelector('.filter-section');
        if (filters) filters.style.display = 'none';
    });
</script>
{% endblock %}
