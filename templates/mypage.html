{% extends "base.html" %}

{% block title %}マイページ{% endblock %}

{% block head %}
<style>
    .mypage-container {
        max-width: 600px;
        margin: 40px auto;
        background: var(--bg-card);
        padding: 30px;
        border-radius: 16px;
        border: 1px solid var(--border);
    }

    .mypage-header {
        border-bottom: 2px solid var(--border);
        padding-bottom: 20px;
        margin-bottom: 20px;
    }

    .mypage-header h2 {
        color: var(--accent);
        margin: 0 0 10px 0;
        font-size: 1.4rem;
    }

    .user-id-badge {
        display: inline-block;
        background: #1e293b;
        color: #cbd5e1;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.85rem;
        border: 1px solid #334155;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: #0f172a;
        padding: 24px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid #334155;
    }

    .stat-value {
        font-size: 2.2rem;
        font-weight: 800;
        display: block;
        margin-top: 8px;
        color: white;
    }

    .stat-label {
        color: var(--text-dim);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.05em;
    }

    .action-links {
        display: flex;
        gap: 12px;
        flex-direction: column;
    }

    .action-btn {
        display: block;
        text-align: center;
        padding: 12px;
        background: #334155;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: background 0.2s;
    }

    .action-btn:hover {
        background: #475569;
    }
</style>
{% endblock %}

{% block content %}
<div class="mypage-container">
    <div class="mypage-header">
        <h2>こんにちは、{{ g.user.username }} さん</h2>
        <div class="user-id-badge">ユーザーID: {{ g.user.id }}</div>
    </div>

    <h3 style="margin-bottom: 16px; font-size: 1.1rem; color: #f1f5f9;">あなたのデータ</h3>
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">所持サーヴァント</span>
            <span class="stat-value">{{ owned_count }}<span
                    style="font-size:1rem;color:var(--text-dim);margin-left:4px;">騎</span></span>
        </div>
        <div class="stat-card">
            <span class="stat-label">登録済み編成</span>
            <span class="stat-value">{{ party_count }}<span
                    style="font-size:1rem;color:var(--text-dim);margin-left:4px;">件</span></span>
        </div>
    </div>

    <h3 style="margin-bottom: 16px; font-size: 1.1rem; color: #f1f5f9;">メニュー</h3>
    <div class="action-links">
        <a href="/" class="action-btn">パーティを新しく編成する</a>
        <a href="/parties" class="action-btn">編成一覧を見る</a>
        <a href="/registration" class="action-btn">所持状況を更新する</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // マイページではサーヴァント/礼装タブや検索フィルタを隠す
        const tabs = document.querySelector('.mode-tabs');
        if (tabs) tabs.style.display = 'none';
        const filters = document.querySelector('.filter-section');
        if (filters) filters.style.display = 'none';
        document.getElementById('nav-mypage').classList.add('active');
    });
</script>
{% endblock %}
